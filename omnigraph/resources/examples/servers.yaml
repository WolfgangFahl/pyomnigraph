#
# pyomnigraph server configuration example
# see https://github.com/WolfgangFahl/pyomnigraph
#
servers:
  blazegraph:
    server: "blazegraph"
    name: "blazegraph"
    wikidata_id: "Q20127748"
    container_name: "blazegraph-omnigraph"
    image: "lyrasis/blazegraph:2.1.5"
    # datasets are implemented as namespaces in blazegraph
    dataset: "kb"
    port: 9898
    test_port: 7898
    host: "localhost"
    # docker_bind: "0.0.0.0"  # Optional: Uncomment to allow external access (default: "127.0.0.1" for localhost-only, recommended for security)
    prefix_sets: ["rdf", "blazegraph","gov","wikidata"]
    active: true
  graphdb:
    # actuarlly graphdb-free
    # https://hub.docker.com/r/khaller/graphdb-free
    server: "graphdb"
    name: "graphdb"
    wikidata_id: "Q58425577"
    container_name: "graphdb-omnigraph"
    license_env_var: "GRAPHDB_LICENSE_KEY"
    image: "ontotext/graphdb:11.2.0"
    free_image: "khaller/graphdb-free:latest"
    dataset: "repo1"                    # GraphDB calls them repositories
    port: 7200                          # GraphDB default port
    test_port: 7700
    host: "localhost"
    # license issue
    active: false
  jena:
    server: "jena"
    name: "jena"
    wikidata_id: "Q109376461"
    container_name: "jena-omnigraph"
    image: "stain/jena-fuseki:latest"
    dataset: "ds"
    port: 3030
    test_port: 7030
    host: "localhost"
    auth_user: admin
    auth_password: "Q109376461"
    prefix_sets: ["rdf", "gov","wikidata"]
    active: true
  oxigraph:
    server: "oxigraph"
    name: "oxigraph"
    wikidata_id: "Q118980507"
    container_name: "oxigraph-omnigraph"
    image: "oxigraph/oxigraph:latest"
    dataset: "default"
    port: 7878
    test_port: 7378
    host: "localhost"
    active: true
  qlever:
    server: "qlever"
    name: "qlever"
    wikidata_id: "Q111016295"
    container_name: "qlever-omnigraph"
    image: "adfreiburg/qlever:latest"
    dataset: "olympics"
    port: 7019
    test_port: 7819
    host: "localhost"
    prefix_sets: ["rdf", "gov","wikidata"]
    needed_software:
      software_list:
        - command: "pip"
          info: "pip (Install with 'apt install python3-pip' or 'yum install python3-pip')"
        - command: "qlever"
          info: "qlever (Install via pipx install qlever)"
        - command: "unzip"
          info: "needed by qlever script (Install e.g. via apt install unzip)"
    active: true
  stardog:
    server: "stardog"
    name: "stardog"
    wikidata_id: "Q91147741"
    container_name: "stardog-omnigraph"
    image: "stardog/stardog:latest"
    license_env_var: "STARDOG_LICENSE_KEY"
    dataset: "mydb"
    port: 5820
    test_port: 5320
    host: "localhost"
    auth_user: "admin"
    auth_password: "admin"
    # license issue
    active: false
  virtuoso:
    server: "virtuoso"
    name: "virtuoso"
    wikidata_id: "Q7935239"
    container_name: "virtuoso-omnigraph"
    image: "openlink/virtuoso-opensource-7:latest"
    dataset: "KB"
    port: 8890
    test_port: 8390
    host: "localhost"
    auth_user: "dba"
    auth_password: "dba"
    # Permissions issue with default graph writes - needs investigation
    active: false
  millenniumdb:
    server: "millenniumdb"
    name: "millenniumdb"
    wikidata_id: "Q118954995"
    container_name: "millenniumdb-omnigraph"
    # https://hub.docker.com/r/imfd/millenniumdb
    image: "imfd/millenniumdb"
    dataset: "default"
    port: 1234
    test_port: 1734
    host: "localhost"
    prefix_sets: ["rdf", "wikidata"]
    active: false
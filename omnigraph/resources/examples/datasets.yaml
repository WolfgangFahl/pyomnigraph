# pyomnigraph RDF datasets configuration example
# see https://github.com/WolfgangFahl/pyomnigraph
#
datasets:
  wikidata_triplestores:
    # Human-readable dataset name
    name: "Triplestores"
    # SPARQL endpoint URL
    base_url: "https://query.wikidata.org"
    endpoint_url: "https://query.wikidata.org/sparql"
    # Expected number of triples
    expected_solutions: 1190
    # Basic Graph Pattern for selection - get instances and their properties
    select_pattern: "?s wdt:P31 wd:Q3539533 . ?s ?p ?o"
    construct_template: "?s ?p ?o"
    # Optional dataset description
    description: "Triplestores and their properties"
    active: true
  wikidata_family_merkel:
    name: "Wikidata Family Name Merkel"
    base_url: "https://query.wikidata.org"
    endpoint_url: "https://query.wikidata.org/sparql"
    database: "blazegraph"
    expected_solutions: 5000
    select_pattern: |
      ?s <http://www.wikidata.org/prop/direct/P734> <http://www.wikidata.org/entity/Q1921787>.
      ?s ?p ?o
    construct_template: "?s ?p ?o"
    description: "Persons having a family name (P734) Merkel and their properties"
    active: true
  gov_full:
    # https://gov.genealogy.net/ontology.owl
    # Genealogisches OrtsVerzeichnis
    # Historical location directory
    name: "GOV"
    # SPARQL endpoint URL
    base_url: "https://gov-sparql.genealogy.net/"
    endpoint_url: "https://gov-sparql.genealogy.net/dataset/sparql"
    # Expected number of triples
    expected_solutions: 36606943
    # Basic Graph Pattern for selection
    select_pattern: "?s ?p ?o"
    construct_template: "?s ?p ?o"
    # Optional dataset description
    description: "GOV genealogy full dataset"
    active: false
  gov-w2306:
    name: "GOV W2306 Coordinates"
    # SPARQL endpoint URL
    base_url: "https://gov-sparql.genealogy.net/"
    endpoint_url: "https://gov-sparql.genealogy.net/dataset/sparql"
    # Expected number of triples
    expected_solutions: 100
    # Basic Graph Pattern for selection
    select_pattern: |
      ?place a <http://gov.genealogy.net/ontology.owl#GovObject> .
      ?place <http://gov.genealogy.net/ontology.owl#hasPostalCode> ?pc .
      ?pc <http://gov.genealogy.net/ontology.owl#value> "W2306" .
      ?place <http://www.opengis.net/ont/geosparql#wktLiteral> ?geo .
      ?place <http://gov.genealogy.net/ontology.owl#hasName> ?pName .
      ?pName <http://gov.genealogy.net/ontology.owl#value> ?name
    construct_template: |
        ?place ?p4place ?o4place .
        ?pc ?p4pc ?o4pc .
        ?pName ?p4Name ?o4Name
    # Optional dataset description
    description: "W2306 postal code coordinates"
    active: false
  papers_of_my_network_wikidata:
    # npq (named parameterized query) example - issue #36
    # ORCID is the join key; {{ orcids }} is the VALUES scaling knob;
    # endpoint is late-bound - own copy answers completely and fastest,
    # see the endpoint matrix in the issue
    name: "Papers of my network (wikidata)"
    base_url: "https://qlever-api.wikidata.dbis.rwth-aachen.de"
    endpoint_url: "https://qlever-api.wikidata.dbis.rwth-aachen.de/"
    database: "qlever"
    select_pattern: |
      VALUES ?orcid { {{ orcids }} }
      ?author <http://www.wikidata.org/prop/direct/P496> ?orcid .
      ?work <http://www.wikidata.org/prop/direct/P50> ?author .
      ?work ?p ?o
    construct_template: "?work ?p ?o"
    params:
      orcids: '"0000-0002-0821-6995" "0000-0003-2533-6363" "0000-0001-9879-3827" "0000-0001-6324-7164"'
    description: "Papers authored by the co-author network, seeded by ORCIDs"
    active: false
  papers_of_my_network_dblp:
    # npq companion - same {{ orcids }} param drives the dblp graph
    name: "Papers of my network (dblp)"
    base_url: "https://sparql.dblp.org"
    endpoint_url: "https://sparql.dblp.org/sparql"
    database: "qlever"
    select_pattern: |
      VALUES ?orcid { {{ orcids }} }
      BIND(IRI(CONCAT("https://orcid.org/", ?orcid)) AS ?orcid_uri)
      ?author <https://dblp.org/rdf/schema#orcid> ?orcid_uri .
      ?paper <https://dblp.org/rdf/schema#authoredBy> ?author .
      ?paper ?p ?o
    construct_template: "?paper ?p ?o"
    params:
      orcids: '"0000-0002-0821-6995" "0000-0003-2533-6363" "0000-0001-9879-3827" "0000-0001-6324-7164"'
    description: "Papers authored by the co-author network in dblp, same ORCID seed"
    active: false
